<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Homework 02</title>
    <style>
        body { margin: 0; background-color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        /* 캔버스와 텍스트를 함께 묶어둘 컨테이너 */
        #container { position: relative; }
        canvas { background-color: black; display: block; }
        /* 7) 캔버스 위에 메시지 표시 */
        #message { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="container">
        <div id="message">Use arrow keys to move the rectangle</div>
        <canvas id="glCanvas"></canvas>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
